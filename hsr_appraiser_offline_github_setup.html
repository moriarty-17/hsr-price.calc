      const [imageBase64, setImageBase64] = useState('');

      const chatEndRef = useRef(null);

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(null), 4000);
      };

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chatHistory]);

      // Set default demo data saat startup pertama
      useEffect(() => {
        setSelectedChars({
          rin_tohsaka: { owned: true, e: 2, s: 1 }, 
          sunday: { owned: true, e: 0, s: 0 },      
          feixiao: { owned: true, e: 0, s: 1 }      
        });
      }, []);

      const calculateAccountValue = () => {
        let breakdown = {
          baseLevel: 0, baseLevelUsd: 0,
          limitedChars: 0, limitedCharsUsd: 0,
          eidolons: 0, eidolonsUsd: 0,
          lightCones: 0, lightConesUsd: 0,
          jades: 0, jadesUsd: 0,
          pass: 0, passUsd: 0,
          standards: 0, standardsUsd: 0
        };

        if (accountLevel >= 70) {
          breakdown.baseLevel = 25000; breakdown.baseLevelUsd = 1.6;
        } else if (accountLevel >= 60) {
          breakdown.baseLevel = 10000; breakdown.baseLevelUsd = 0.6;
        } else {
          breakdown.baseLevel = 2000; breakdown.baseLevelUsd = 0.1;
        }

        if (hasPass) {
          breakdown.pass = 10000; breakdown.passUsd = 0.65;
        }

        const pulls = stellarJades / 160;
        breakdown.jades = Math.round(pulls * 1000); 
        breakdown.jadesUsd = Math.round(pulls * 0.065 * 100) / 100;

        breakdown.standards = standardFiveStarCount * 3000;
        breakdown.standardsUsd = standardFiveStarCount * 0.20;

        Object.keys(selectedChars).forEach(id => {
          const charConfig = selectedChars[id];
          const dbChar = HSR_CHARACTERS.find(c => c.id === id);
          
          if (charConfig?.owned && dbChar) {
            breakdown.limitedChars += dbChar.baseValIdr;
            breakdown.limitedCharsUsd += dbChar.baseValUsd;

            if (charConfig.e > 0) {
              let eValIdr = 0; let eValUsd = 0;
              if (charConfig.e === 1) {
                eValIdr = 25000; eValUsd = 1.6;
              } else if (charConfig.e === 2) {
                eValIdr = 70000; eValUsd = 4.5; 
              } else if (charConfig.e >= 3 && charConfig.e <= 5) {
                eValIdr = 70000 + (charConfig.e - 2) * 15000;
                eValUsd = 4.5 + (charConfig.e - 2) * 1.0;
              } else if (charConfig.e === 6) {
                eValIdr = 180000; eValUsd = 11.5; 
              }
              breakdown.eidolons += eValIdr;
              breakdown.eidolonsUsd += eValUsd;
            }

            if (charConfig.s > 0) {
              let lcValIdr = dbChar.baseValIdr * 0.70; 
              let lcValUsd = dbChar.baseValUsd * 0.70;

              if (charConfig.s > 1) {
                const extraSuperimposes = charConfig.s - 1;
                lcValIdr += extraSuperimposes * 10000;
                lcValUsd += extraSuperimposes * 0.65;
              }

              breakdown.lightCones += lcValIdr;
              breakdown.lightConesUsd += lcValUsd;
            }
          }
        });

        const totalIdr = breakdown.baseLevel + breakdown.pass + breakdown.jades + breakdown.standards + breakdown.limitedChars + breakdown.eidolons + breakdown.lightCones;
        const totalUsd = breakdown.baseLevelUsd + breakdown.passUsd + breakdown.jadesUsd + breakdown.standardsUsd + breakdown.limitedCharsUsd + breakdown.eidolonsUsd + breakdown.lightConesUsd;

        return {
          breakdown,
          idr: Math.round(totalIdr),
          usd: Math.round(totalUsd * 10) / 10
        };
      };

            Karakter Valid Patch 4.4:

                        <input type="file" id="upload-img" accept="image/*" onChange={handleImageChange} className="hidden" />
                      </label>
                      <input type="text" placeholder="Tanyakan taksiran karakter..." value={userInput} onChange={(e) => setUserInput(e.target.value)} onKeyPress={handleKeyPress} className="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 text-xs text-white focus:outline-none" />
                      <button onClick={sendMessageToAi} className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-4 rounded-xl font-bold">Kirim</button>
                    </div>
                  </div>

                </div>
              )}

            </section>

          </main>

          <footer className="border-t border-slate-900 bg-slate-950 text-center py-4 text-[10px] text-slate-500 mt-auto">
            <p>© 2026 StarRail Appraiser. Dibuat presisi untuk transaksi pasar sekunder Indonesia.</p>
          </footer>

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
